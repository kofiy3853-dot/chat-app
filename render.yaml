services:
  # Backend Web Service
  - type: web
    name: campus-chat-backend
    runtime: node
    plan: free
    region: ohio
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campus-chat-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://social-networking-mu.vercel.app
      - key: JWT_SECRET
        generateValue: true

databases:
  # Managed PostgreSQL Database
  - name: campus-chat-db
    plan: free
    region: ohio
    databaseName: campuschat
    user: kofi
