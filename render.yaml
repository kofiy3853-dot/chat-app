services:
  # Backend Web Service
  - type: web
    name: campus-chat-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres.pkfysnbnfjjybxrsxsiu:CampusChatPassword123!@aws-1-us-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: campus-chat-frontend
          type: web
          property: host
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Web Service (Next.js)
  - type: web
    name: campus-chat-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: campus-chat-backend
          type: web
          property: host
      - key: NODE_ENV
        value: production
